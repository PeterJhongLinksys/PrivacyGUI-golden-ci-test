name: Generate Golden

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: showcase (gallery only) or baseline (gallery + baseline for daily verify)'
        required: true
        default: 'baseline'
        type: choice
        options:
          - showcase
          - baseline
      branch:
        description: 'PrivacyGUI branch to test'
        required: true
        default: 'usp'
        type: string
      locales:
        description: 'Comma-separated locales'
        required: true
        default: 'ar,da,de,el,en,es,es_ar,fi,fr,fr_ca,id,it,ja,ko,nb,nl,pl,pt,pt_pt,ru,sv,th,tr,vi,zh,zh_TW'
        type: string
      screens:
        description: 'Comma-separated screen widths (e.g., 480,1280)'
        required: true
        default: '480,1280'
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout orchestration repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure SSH for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UI_KIT_DEPLOY_KEY }}

      - name: Configure git to use SSH for private dependency only
        run: git config --global url."git@github.com:linksys/privacyGUI-UI-kit".insteadOf "https://github.com/linksys/privacyGUI-UI-kit"

      - name: Clone PrivacyGUI
        run: git clone --branch "${{ inputs.branch }}" --depth 1 https://github.com/linksys/PrivacyGUI.git app

      - name: Setup PrivacyGUI environment
        working-directory: app
        run: |
          cp assets/agents/env.template assets/agents/.env
          flutter pub get

      - name: Generate golden snapshots
        working-directory: app
        run: bash run_generate_loc_snapshots.sh -l "${{ inputs.locales }}" -s "${{ inputs.screens }}"

      - name: Configure git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # --- Baseline mode only: save baseline to dedicated branch ---
      - name: Debug golden output paths
        if: inputs.mode == 'baseline'
        run: |
          echo "=== Checking app/test/golden_test exists ==="
          ls app/test/ | head -20
          echo "=== PNG files in app (first 20) ==="
          find app/test -type f -name "*.png" | head -20
          echo "=== PNG count ==="
          find app/test -type f -name "*.png" | wc -l
          echo "=== PNGs matching */goldens/*.png pattern ==="
          find app/test -type f -name "*.png" -path "*/goldens/*.png" | wc -l

      - name: Collect baseline PNGs
        if: inputs.mode == 'baseline'
        run: |
          bash scripts/collect_baseline_from_app.sh app goldens 2>&1
          echo "Collected PNGs:"
          find goldens -type f -name "*.png" | wc -l

      - name: Commit baseline to baseline branch
        if: inputs.mode == 'baseline'
        run: |
          cp -r goldens /tmp/new-goldens
          rm -rf goldens

          if git ls-remote --heads origin baseline | grep -q baseline; then
            git fetch origin baseline
            git checkout baseline
          else
            git checkout --orphan baseline
            git reset
            git clean -fd
          fi

          rm -rf goldens
          mv /tmp/new-goldens goldens
          git add goldens/

          if git diff --cached --quiet; then
            echo "No changes to baseline"
          else
            git commit -m "Update baseline from ${{ inputs.branch }} [${{ inputs.locales }}] [${{ inputs.screens }}]"
            git push --force origin baseline
          fi

          git checkout main

      # --- Publish gallery report to gh-pages ---
      - name: Determine gallery subpath
        id: gallery
        run: |
          if [ "${{ inputs.mode }}" = "showcase" ]; then
            echo "subpath=golden/usp" >> "$GITHUB_OUTPUT"
          else
            echo "subpath=golden/dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages branch
        run: |
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch origin gh-pages
            git worktree add gh-pages-dir gh-pages
          else
            git worktree add --detach gh-pages-dir
            cd gh-pages-dir
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd ..
          fi

      - name: Publish gallery report
        env:
          SUBPATH: ${{ steps.gallery.outputs.subpath }}
        run: |
          scripts/publish_to_pages.sh app/test/golden_test gh-pages-dir "$SUBPATH"

          cd gh-pages-dir
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to gallery report"
          else
            git commit -m "Update gallery [${{ inputs.mode }}] from ${{ inputs.branch }}"
            git push origin gh-pages
          fi

      - name: Update README report links
        run: |
          git checkout main
          scripts/update_readme_links.sh gh-pages-dir README.md "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to README"
          else
            git commit -m "docs: update report links in README"
            git push origin main
          fi

      - name: Output results
        env:
          SUBPATH: ${{ steps.gallery.outputs.subpath }}
        run: |
          echo "Mode: ${{ inputs.mode }}"
          echo "Gallery URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/$SUBPATH/golden_gallery_report.html"
